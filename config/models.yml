# CareerLoop — Model Configuration
# ─────────────────────────────────────────────────────────────────
# All LLM model names and API routing live here.
# API keys go in .env (never in this file).
#
# Model reference (DeepSeek):
#   deepseek-chat      → DeepSeek V3 (fast, cheap, good for simple tasks)
#   deepseek-v4-pro    → DeepSeek V4 Pro (most capable, for complex reasoning)
#   deepseek-reasoner  → DeepSeek R1 (reasoning-first, slower)
# ─────────────────────────────────────────────────────────────────

# ── Fit Scoring Engine (careerloop/india_fit_llm.py) ─────────────
fit_engine:
  provider: deepseek
  model: deepseek-chat            # V3 — fast, cheap, good for heuristic scoring
  temperature: 0.3
  max_tokens: 2000

# ── Extraction Engine (careerloop/sources/scrapegraph_adapter.py)
scrape_engine:
  provider: deepseek
  model: deepseek/deepseek-chat   # V3 — ScrapeGraphAI expects "provider/model"
  temperature: 0.1
  max_tokens: 4000

# ── Resume Council (careerloop/council/llm.py) ───────────────────
resume_council:
  provider: deepseek
  strategy_model: deepseek-v4-pro   # V4 Pro — S3-S6: company intel, role decode, user truth, positioning
  writer_model: deepseek-chat       # V3 — S7-S8: section rewrites, cover note, DM
  temperature: 0.2
  max_tokens: 10000                 # Large output needed for full section rewrites
