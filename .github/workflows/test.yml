name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - run: npm install
      - run: node test-all.mjs --quick
      - name: Install Python deps for smoke test
        if: ${{ secrets.CAREERLOOP_DATABASE_URL != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary langgraph langchain-core prompt_toolkit rich
      - name: Run CareerLoop E2E smoke test
        if: ${{ secrets.CAREERLOOP_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.CAREERLOOP_DATABASE_URL }}
        run: |
          PYTHONPATH=. python scripts/smoke_test_e2e.py
